<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — GoalMine</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <nav>
    <a href="/" class="logo">Goal<span>Mine</span></a>
    <div class="nav-right">
      <a href="/login" class="btn-nav">Log In</a>
    </div>
  </nav>

  <main class="auth-main">
    <div class="auth-card">
      <h1 class="auth-title">Start mining your goals</h1>
      <p class="auth-sub">Create your free account to save plans and earn GoalCoins.</p>

      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}

      <form method="POST" class="auth-form">
        <div class="field">
          <label>Name</label>
          <input type="text" name="name" placeholder="Your first name" required/>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@email.com" required/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" placeholder="At least 6 characters" required/>
        </div>
        <button type="submit" class="btn-gold">Create Account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
      <p class="auth-switch"><a href="/">Continue as guest →</a></p>
    </div>
  </main>
</body>
</html>
